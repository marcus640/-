<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аня 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8497a;
    --blush: #f4a0bc;
    --petal: #fce8f0;
    --deep: #2a0a14;
    --gold: #d4a853;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--deep);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, #5c102a 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 100%, #3a0820 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, #1a0510 0%, transparent 60%);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(4rem, 12vw, 9rem);
    color: transparent;
    background: linear-gradient(135deg, var(--blush) 0%, var(--gold) 40%, var(--rose) 70%, #fff0f5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 40px rgba(232, 73, 122, 0.4));
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 2;
    user-select: none;
    animation: nameGlow 3s ease-in-out infinite alternate;
  }

  @keyframes nameGlow {
    from { filter: drop-shadow(0 0 30px rgba(232, 73, 122, 0.3)); }
    to   { filter: drop-shadow(0 0 60px rgba(232, 73, 122, 0.7)) drop-shadow(0 0 100px rgba(212, 168, 83, 0.2)); }
  }

  .btn-wrap {
    position: relative;
    z-index: 2;
  }

  .heart-btn {
    position: relative;
    padding: 1.1rem 3.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-style: italic;
    letter-spacing: 0.12em;
    color: var(--petal);
    background: transparent;
    border: 1.5px solid rgba(244, 160, 188, 0.5);
    border-radius: 60px;
    cursor: pointer;
    outline: none;
    overflow: visible;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    background: rgba(232, 73, 122, 0.08);
    box-shadow:
      0 0 30px rgba(232, 73, 122, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .heart-btn::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 60px;
    background: linear-gradient(135deg, rgba(244,160,188,0.4), rgba(232,73,122,0.2), rgba(212,168,83,0.3));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 1px;
    opacity: 0.6;
    transition: opacity 0.3s;
  }

  .heart-btn:hover {
    background: rgba(232, 73, 122, 0.18);
    box-shadow: 0 0 50px rgba(232, 73, 122, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }

  .heart-btn:hover::before { opacity: 1; }

  .heart-btn:active { transform: translateY(1px) scale(0.98); }

  /* Floating hearts container */
  #hearts-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .heart {
    position: absolute;
    font-size: 1.5rem;
    pointer-events: none;
    animation: floatUp var(--dur, 2.5s) ease-out forwards;
    opacity: 0;
    transform-origin: center;
    will-change: transform, opacity;
  }

  @keyframes floatUp {
    0%   { opacity: 0;   transform: translateY(0)       scale(0.3) rotate(var(--rot)); }
    10%  { opacity: 1;   transform: translateY(-30px)   scale(1.1) rotate(calc(var(--rot) * 0.8)); }
    80%  { opacity: 0.8; transform: translateY(var(--rise)) scale(var(--sc)) rotate(calc(var(--rot) * -0.5)) translateX(var(--sway)); }
    100% { opacity: 0;   transform: translateY(calc(var(--rise) - 40px)) scale(0.6) rotate(0deg) translateX(var(--sway)); }
  }

  /* Ambient floating hearts (always) */
  .ambient {
    animation: ambientFloat var(--dur) ease-in-out infinite;
    opacity: 0.12;
  }

  @keyframes ambientFloat {
    0%, 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0.08; }
    50%       { transform: translateY(-18px) scale(1.1) rotate(8deg); opacity: 0.18; }
  }

  /* Pulse ring on click */
  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(232, 73, 122, 0.6);
    animation: pulseRing 0.8s ease-out forwards;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes pulseRing {
    from { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(1); }
    to   { width: 200px; height: 200px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>

<div class="name">Аня</div>

<div class="btn-wrap">
  <button class="heart-btn" id="mainBtn">
    Натисни мене 💖
  </button>
</div>

<div id="hearts-container"></div>

<script>
  const container = document.getElementById('hearts-container');
  const btn = document.getElementById('mainBtn');

  const heartEmojis = ['💖','💗','💓','💞','💕','❤️','🌸','✨','💝','🌷','💫','🩷'];

  /* Ambient hearts */
  function spawnAmbient() {
    const h = document.createElement('span');
    h.className = 'heart ambient';
    h.textContent = heartEmojis[Math.floor(Math.random() * 6)];
    h.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 30}%;
      font-size: ${0.8 + Math.random() * 1.2}rem;
      --dur: ${5 + Math.random() * 6}s;
      animation-delay: ${Math.random() * 5}s;
    `;
    container.appendChild(h);
    setTimeout(() => h.remove(), 14000);
  }

  for (let i = 0; i < 8; i++) setTimeout(spawnAmbient, i * 700);
  setInterval(spawnAmbient, 1800);

  /* Click burst */
  btn.addEventListener('click', (e) => {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    // Pulse ring
    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    ring.style.cssText = `left:${cx}px; top:${cy}px;`;
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 900);

    // Burst hearts
    const count = 18 + Math.floor(Math.random() * 10);
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const h = document.createElement('span');
        h.className = 'heart';
        h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];

        const spread = 120;
        const startX = cx + (Math.random() - 0.5) * spread;
        const startY = cy;
        const rise = -(180 + Math.random() * 280);
        const sway = (Math.random() - 0.5) * 160 + 'px';
        const rot = (Math.random() - 0.5) * 40;
        const sc = 0.7 + Math.random() * 0.8;
        const dur = 1.8 + Math.random() * 1.4;
        const size = 1.2 + Math.random() * 1.8;

        h.style.cssText = `
          left: ${startX}px;
          top: ${startY}px;
          font-size: ${size}rem;
          --rise: ${rise}px;
          --sway: ${sway};
          --rot: ${rot}deg;
          --sc: ${sc};
          --dur: ${dur}s;
        `;
        container.appendChild(h);
        setTimeout(() => h.remove(), dur * 1000 + 200);
      }, i * 55);
    }
  });
</script>
</body>
</html>
